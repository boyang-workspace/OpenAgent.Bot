name: Daily Discovery

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run discovery
        run: npm run discovery:daily
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Create discovery pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/daily-discovery
          delete-branch: true
          title: Daily open AI discovery
          commit-message: Daily open AI discovery
          body: |
            Automated discovery run for OpenAgent.bot.

            Review the generated candidates, topics, and draft project profiles before publishing anything.

            Publishing rule:
            - Drafts live in `content/projects/drafts`
            - Public pages only render `content/projects/published`
            - Move a reviewed draft to `published` in a separate editorial PR
